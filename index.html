<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <title>Leitor de Mensagens WhatsApp</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, Arial, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; padding: 1.5rem; }
    .container { max-width: 700px; margin: 0 auto; }
    header h1 { font-size: 1.4rem; margin-bottom: 1.2rem; color: #58a6ff; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 1.2rem; display: flex; flex-direction: column; gap: 0.9rem; }
    label { font-size: 0.95rem; color: #8b949e; }
    textarea { width: 100%; height: 200px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 1rem; padding: 0.75rem; resize: vertical; line-height: 1.6; font-family: inherit; }
    textarea:focus { outline: 2px solid #58a6ff; border-color: #58a6ff; }
    .toolbar { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
    button { padding: 0.6rem 1rem; border: none; border-radius: 8px; font-size: 0.95rem; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    #btnLer { background: #238636; color: #fff; }
    #btnPause { background: #9e6a03; color: #fff; }
    #btnStop { background: #b62324; color: #fff; }
    .speed-wrap { display: flex; align-items: center; gap: 0.4rem; margin-left: auto; }
    .speed-wrap label { font-size: 0.9rem; color: #8b949e; }
    select { background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 6px; padding: 0.4rem 0.6rem; font-size: 0.9rem; }
    .status { margin-top: 1rem; padding: 0.75rem 1rem; background: #161b22; border: 1px solid #30363d; border-radius: 8px; font-size: 0.95rem; color: #8b949e; min-height: 48px; }
    .status.lendo { border-color: #238636; color: #3fb950; }
    .status.pausado { border-color: #9e6a03; color: #e3b341; }
    .status.concluido { border-color: #58a6ff; color: #58a6ff; }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>🎧 Leitor de Mensagens WhatsApp</h1></header>
    <div class="card">
      <label for="inputText">📋 Cole aqui as mensagens copiadas do WhatsApp:</label>
      <textarea id="inputText" placeholder="Selecione as mensagens no WhatsApp Web, copie (Ctrl+C) e cole aqui (Ctrl+V)..."></textarea>
      <div class="toolbar">
        <button id="btnLer">▶ Ler mensagens</button>
        <button id="btnPause" disabled>⏸ Pausar</button>
        <button id="btnStop" disabled>⏹ Parar</button>
        <div class="speed-wrap">
          <label for="rate">Velocidade:</label>
          <select id="rate">
            <option value="0.7">Lenta</option>
            <option value="1" selected>Normal</option>
            <option value="1.3">Rápida</option>
            <option value="1.6">Muito rápida</option>
          </select>
        </div>
      </div>
    </div>
    <div class="status" id="status">Aguardando mensagens...</div>
  </div>
  <script>
    const synth = window.speechSynthesis;
    const btnLer = document.getElementById('btnLer');
    const btnPause = document.getElementById('btnPause');
    const btnStop = document.getElementById('btnStop');
    const inputText = document.getElementById('inputText');
    const rateSelect = document.getElementById('rate');
    const statusEl = document.getElementById('status');
    let isPaused = false, isReading = false;
    function setStatus(msg, cls) { statusEl.textContent = msg; statusEl.className = 'status' + (cls ? ' ' + cls : ''); }
    function getRate() { return parseFloat(rateSelect.value) || 1; }
    function updateButtons(reading) { btnLer.disabled = reading; btnPause.disabled = !reading; btnStop.disabled = !reading; }
    function lerTexto() {
      const texto = inputText.value.trim();
      if (!texto) { setStatus('⚠️ Cole as mensagens do WhatsApp na caixa acima primeiro!'); return; }
      synth.cancel(); isPaused = false; isReading = true; updateButtons(true);
      setStatus('🔊 Lendo mensagens...', 'lendo');
      const linhas = texto.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      let idx = 0;
      function next() {
        if (!isReading || idx >= linhas.length) { isReading = false; isPaused = false; updateButtons(false); if (idx >= linhas.length) setStatus('✅ Leitura concluída!', 'concluido'); return; }
        const u = new SpeechSynthesisUtterance(linhas[idx++]);
        u.lang = 'pt-BR'; u.rate = getRate(); u.onend = next; u.onerror = next; synth.speak(u);
      }
      next();
    }
    btnLer.addEventListener('click', lerTexto);
    btnPause.addEventListener('click', () => {
      if (!isReading) return;
      if (!isPaused) { synth.pause(); isPaused = true; btnPause.textContent = '▶ Continuar'; setStatus('⏸ Pausado.', 'pausado'); }
      else { synth.resume(); isPaused = false; btnPause.textContent = '⏸ Pausar'; setStatus('🔊 Lendo mensagens...', 'lendo'); }
    });
    btnStop.addEventListener('click', () => { synth.cancel(); isReading = false; isPaused = false; btnPause.textContent = '⏸ Pausar'; updateButtons(false); setStatus('⏹ Leitura interrompida.'); });
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
